services:
  test:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      APP_ENV: test
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      CLAUDE_MOCK_MODE: "true"
      ADMIN_API_KEY: test-admin-key
      FB_APP_SECRET: ""
    command: sh -c "pip install -q -r requirements.txt && pytest -v --tb=short"
