name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hotelbot
          POSTGRES_PASSWORD: hotelbot123
          POSTGRES_DB: hotel_chatbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://hotelbot:hotelbot123@localhost:5432/hotel_chatbot_test
          ANTHROPIC_API_KEY: test_key
          CLAUDE_MOCK_MODE: true
          APP_ENV: test
        run: |
          pytest -v --tb=short
  
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install flake8
        run: pip install flake8
      
      - name: Run flake8
        run: |
          flake8 app/ tests/ --max-line-length=120 --ignore=E501,W503
